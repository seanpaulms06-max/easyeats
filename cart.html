<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible"
  content="IE=edge">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Cart</title>

  <link rel="stylesheet" href="cart.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- QR CODE LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<!-- CART CONTAINER -->
<div class="cart-container">

  <h1>Your Cart</h1>

  <div id="cart-list"></div>

  <div class="total" id="total"></div>

  <!-- CHECKOUT BUTTON -->
  <button onclick="checkout()"
  class="checkout-btn">

    Check Out

  </button>

  <!-- CLEAR CART -->
  <button onclick="clearCart()">

    Clear Cart

  </button>

</div>



<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">

  <a href="menu.html"
  class="nav-item">

    <i class="fa-solid fa-house"></i>
    <span>Home</span>

  </a>

  <a href="rewards.html"
  class="nav-item">

    <i class="fas fa-star"></i>
    <span>Rewards</span>

  </a>

  <a href="cart.html"
  class="nav-item active">

    <i class="fas fa-shopping-cart"></i>
    <span>Cart</span>

  </a>

  <a href="me.html"
  class="nav-item">

    <i class="fa-regular fa-user"></i>
    <span>Me</span>

  </a>

</div>



<!-- PAYMENT METHOD MODAL -->
<div class="payment-modal"
id="paymentModal">

  <div class="payment-box">

    <h2>Select Payment</h2>

    <!-- GCASH -->
    <button class="payment-option gcash"
    onclick="selectPayment('GCash')">

      GCash

    </button>

    <!-- PAYPAL -->
    <button class="payment-option paypal"
    onclick="selectPayment('PayPal')">

      PayPal

    </button>

    <!-- BPI -->
    <button class="payment-option bpi"
    onclick="selectPayment('BPI')">

      BPI

    </button>

    <!-- CANCEL -->
    <button class="payment-option close-btn"
    onclick="closePaymentModal()">

      Cancel

    </button>

  </div>

</div>



<!-- QR PAYMENT MODAL -->
<div class="payment-modal"
id="qrModal">

  <div class="payment-box">

    <h2 id="paymentTitle">

      QR Payment

    </h2>

    <!-- QR CODE -->
    <div id="qrcode"></div>

    <p class="qr-text">

      Scan this QR code to pay

    </p>

    <!-- ORDER NUMBER -->
    <p class="order-id">

      Order ID:
      <span id="orderIdText"></span>

    </p>

    <!-- AUTO PROCESS -->
    <p class="qr-text">

      Processing payment...

    </p>

  </div>

</div>



<!-- JS -->
<script src="cart.js"></script>

</body>
</html>
