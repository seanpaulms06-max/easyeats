<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rewards</title>

  <link rel="stylesheet" href="rewards.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- QR CODE -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<div class="rewards-container">

  <h1>Rewards System</h1>

  <p class="reward-info">
    Buy the same item 10 times to unlock
    a FREE reward QR code.
  </p>

  <div id="reward-list"></div>

</div>


<!-- FREE REWARD QR MODAL -->
<div class="reward-modal" id="rewardModal">

  <div class="reward-box">

    <h2>Free Reward Unlocked!</h2>

    <div id="rewardQr"></div>

    <p class="reward-text">
      Scan this QR code to claim your free item.
    </p>

    <p class="reward-item" id="rewardItem"></p>

    <button onclick="closeRewardModal()">
      Close
    </button>

  </div>

</div>


<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">

  <a href="menu.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="rewards.html" class="nav-item active">
    <i class="fas fa-star"></i>
    <span>Rewards</span>
  </a>

  <a href="cart.html" class="nav-item">
    <i class="fas fa-shopping-cart"></i>
    <span>Cart</span>
  </a>

  <a href="me.html" class="nav-item">
    <i class="fa-regular fa-user"></i>
    <span>Me</span>
  </a>

</div>

<script src="rewards.js"></script>

</body>
</html>
